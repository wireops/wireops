# wireops Worker — docker-compose deployment
services:
  wireops-worker:
    image: ghcr.io/wireops/wireops-worker:latest
    restart: unless-stopped
    environment:
      # Address of the wireops server
      SERVER_URL: ${SERVER_URL}

      # Worker registration and authentication token
      WORKER_TOKEN: ${WORKER_TOKEN}

      # Optional: override the hostname reported to the server.
      # Defaults to the container's hostname if not set.
      HOSTNAME: ${WORKER_HOSTNAME:-}

      # Optional: override where the worker writes temporary rendered compose files.
      # Defaults to /tmp/wireops-worker inside the container.
      WORKER_STACK_DIR: /tmp/wireops-worker

    volumes:
      # Give the worker access to the Docker socket so it can run
      # `docker compose up` on behalf of the server.
      - /var/run/docker.sock:/var/run/docker.sock

    # Required so the worker can reach the server over the host network
    # (adjust if the server is on a remote host or uses a custom network).
    # network_mode: host   ← uncomment if worker and server are on the same machine
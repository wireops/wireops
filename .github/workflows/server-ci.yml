name: Server CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: "1.25.12"

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-server-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-server-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run server/backend tests
        env:
          CGO_ENABLED: 0
        run: |
          packages=$(go list ./... | grep -v '^github.com/wireops/wireops/worker\(/\|$\)')
          go test -v $packages

      - name: Run govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build server binary
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o dist/wireops .

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --ignore-scripts

      - name: Run postinstall scripts
        working-directory: ./frontend
        run: npm run postinstall

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test

      - name: Run frontend linter
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run generate

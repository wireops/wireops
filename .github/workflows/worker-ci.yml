name: Worker CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: "1.25.12"

jobs:
  worker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-worker-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-worker-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run worker tests
        env:
          CGO_ENABLED: 0
        run: go test -v ./worker/... ./internal/worker/...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        continue-on-error: true
        run: govulncheck ./worker/... ./internal/worker/...

      - name: Build worker binary
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o dist/wireops-worker ./worker/main.go

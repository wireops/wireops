name: MCP CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  GO_VERSION: "1.25.3"

jobs:
  mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-mcp-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-mcp-
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Run mcp tests
        env:
          CGO_ENABLED: 0
        run: go test -v ./mcp/...

      - name: Build mcp binary
        env:
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -o dist/wireops-mcp ./mcp/main.go

services:
  wireops:
    image: ghcr.io/wireops/server:latest
    restart: unless-stopped
    container_name: wireops
    ports:
      # PORT: UI, API, and Prometheus /metrics
      - "${PORT:-8090}:8090"
      # TLS_WORKER_PORT: Remote workers only
      - "${TLS_WORKER_PORT:-8443}:8443"
    volumes:
      - ./data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - APP_URL=${APP_URL:-http://localhost:8090}
      - DATA_DIR=/data
      - BOOTSTRAP_TOKEN=${BOOTSTRAP_TOKEN}

  wireops-worker:
    image: ghcr.io/wireops/worker:latest
    container_name: wireops-worker
    restart: unless-stopped
    depends_on:
      - wireops
    environment:
      - SERVER_URL=${SERVER_URL:-http://wireops:8443}
      - WORKER_TOKEN=${WORKER_TOKEN:-}
      - WORKER_STACK_DIR=/tmp/wireops-worker
      - HOSTNAME=${WORKER_HOSTNAME:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

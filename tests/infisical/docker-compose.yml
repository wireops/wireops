services:
  infisical:
    image: infisical/infisical:latest-postgres
    container_name: wireops-test-infisical
    restart: unless-stopped
    ports:
      - "9900:8080"
    environment:
      - ENCRYPTION_KEY=${INFISICAL_ENCRYPTION_KEY:?run via 'make infisical' from tests/ to generate .env}
      - AUTH_SECRET=${INFISICAL_AUTH_SECRET:?run via 'make infisical' from tests/ to generate .env}
      - SITE_URL=http://localhost:9900
      - TELEMETRY_ENABLED=false
    volumes:
      - ./.data:/var/lib/postgresql/data
    # All-in-one image (bundled Postgres) for local testing — not a
    # production deployment layout. ENCRYPTION_KEY/AUTH_SECRET come from
    # infisical/.env, generated by `make infisical` in ../Makefile.
